<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#337ECC"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- 马头轮廓 -->
  <g transform="translate(256,260)" fill="none" stroke="#fff" stroke-width="6">
    <!-- 马的身体 -->
    <ellipse cx="20" cy="40" rx="80" ry="55" fill="rgba(255,255,255,0.95)" stroke="none"/>
    <!-- 马头 -->
    <ellipse cx="-40" cy="-30" rx="45" ry="50" fill="rgba(255,255,255,0.95)" stroke="none"/>
    <!-- 鬃毛 -->
    <path d="M-55,-80 Q-30,-120 10,-90 Q20,-85 5,-60" fill="rgba(255,255,255,0.9)" stroke="none"/>
    <!-- 耳朵 -->
    <ellipse cx="-70" cy="-70" rx="10" ry="18" fill="rgba(255,255,255,0.9)" stroke="none" transform="rotate(-20,-70,-70)"/>
    <ellipse cx="-50" cy="-75" rx="10" ry="18" fill="rgba(255,255,255,0.9)" stroke="none" transform="rotate(10,-50,-75)"/>
    <!-- 眼睛 -->
    <circle cx="-55" cy="-35" r="10" fill="#333" stroke="none"/>
    <circle cx="-53" cy="-38" r="3" fill="#fff" stroke="none"/>
    <!-- 鼻孔 -->
    <ellipse cx="-80" cy="-15" rx="6" ry="4" fill="#333" stroke="none"/>
    <!-- 尾巴 -->
    <path d="M100,20 Q130,10 130,40 Q130,60 105,55" fill="rgba(255,255,255,0.85)" stroke="none"/>
    <!-- 腿 -->
    <rect x="-10" y="70" width="16" height="35" rx="5" fill="rgba(255,255,255,0.9)" stroke="none"/>
    <rect x="30" y="70" width="16" height="35" rx="5" fill="rgba(255,255,255,0.9)" stroke="none"/>
    <rect x="55" y="72" width="16" height="33" rx="5" fill="rgba(255,255,255,0.85)" stroke="none"/>
    <rect x="-35" y="72" width="16" height="33" rx="5" fill="rgba(255,255,255,0.85)" stroke="none"/>
    <!-- 缰绳 -->
    <path d="M-85,-5 Q-100,10 -90,25" stroke="rgba(255,255,255,0.6)" stroke-width="4" fill="none"/>
  </g>
  <!-- 文字 -->
  <text x="256" y="430" text-anchor="middle" fill="#fff" font-size="36" font-weight="bold" font-family="sans-serif">记账</text>
</svg>
